# Название нашего процесса, будет отображаться в GitHub
name: Python CI

# Триггеры: когда запускать этот процесс
on:
  # Запускать для всех Pull Request
  pull_request:
  # А также запускать при любом пуше в основную ветку 'main'
  push:
    branches:
      - main

# Задачи (jobs), которые нужно выполнить
jobs:
  build:
    # На какой операционной системе запускать
    runs-on: ubuntu-latest

    # Шаги (steps), которые будут выполняться последовательно
    steps:
      # 1. Шаг: Клонируем репозиторий, чтобы получить доступ к коду
      - name: Check out repository code
        uses: actions/checkout@v4

      # 2. Шаг: Настраиваем окружение Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          # Указываем версию Python, которая используется в проекте
          python-version: '3.11'

      # 3. Шаг: Устанавливаем зависимости
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # Устанавливаем также flake8 и pytest, если их нет в requirements.txt
          pip install flake8 pytest
      
      # 4. Шаг: Проверяем код-стайл с помощью Black
      - name: Check format with Black
        run: |
          pip install black
          # --check только проверяет, не изменяя файлы. Если что-то не так - падает с ошибкой
          black --check .

      # 5. Шаг: Проверяем стиль кода с помощью Flake8
      - name: Lint with Flake8
        run: |
          # Остановить сборку, если есть ошибки, но не учитывать предупреждения.
          # --count покажет количество нарушений
          # --max-complexity=10 - проверка на сложность функций
          # --max-line-length=88 - стандартная длина строки для Black
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=88 --statistics

      # 6. Шаг: Запускаем тесты с помощью Pytest (временно отключено)
      # - name: Test with Pytest
      #   run: |
      #     pytest